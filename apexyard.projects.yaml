version: 1

projects:
  - name: tmt-eye-app
    repo: sourcya/tmt-eye-app
    docs: projects/tmt-eye-app
    status: handover
    tier: P1
    roles:
      - tech-lead
      - frontend-engineer
      - ui-designer
      - platform-engineer
      - security-auditor
      - sre
    tags:
      - frontend
      - nextjs
      - i18n
      - auth
    ticket_prefix: CU

  - name: tmt-cockpit-app
    repo: sourcya/tmt-cockpit-app
    docs: projects/tmt-cockpit-app
    status: active
    tier: P1
    roles:
      - tech-lead
      - frontend-engineer
      - ui-designer
    tags:
      - frontend
      - react
    ticket_prefix: CU

defaults:
  status: active
  tier: P1
  ticket_prefix: CU
  roles:
    - tech-lead
    - frontend-engineer
